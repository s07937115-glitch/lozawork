<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мир Бумажной Лозы</title>
    <style>
        /* Основные настройки, чтобы всё влезло в экран */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; }

        .main-screen {
            background: linear-gradient(-45deg, #2c1e12, #5d4037, #8d6e63, #2c1e12);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; color: white;
            transition: background 1.5s ease;
        }

        @keyframes gradientMove { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }

        /* Контентный блок */
        .content { opacity: 0; transform: translateY(15px); transition: 0.6s all; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .content.show { opacity: 1; transform: translateY(0); }

        /* Фото (сделали меньше, чтобы кнопки поднялись выше) */
        .magic-photo {
            width: 75vw; max-width: 260px; height: 320px; object-fit: cover;
            border-radius: 20px; border: 4px solid rgba(255,255,255,0.3);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4); margin-bottom: 10px;
        }

        h1 { font-size: 18px; max-width: 85%; font-weight: 400; line-height: 1.3; margin: 10px 0; }
        #icon { font-size: 40px; margin-bottom: 5px; }

        /* Кнопка "Далее" */
        #nextBtn {
            z-index: 100; background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: white; border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 12px 35px; border-radius: 50px; font-size: 16px;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }

        /* Финальные кнопки в ряд и столбик */
        .final-buttons { display: none; flex-direction: column; gap: 8px; width: 80%; max-width: 260px; margin-top: 5px; }
        
        .contact-btn {
            background: white; color: #5d4037; padding: 12px;
            border-radius: 15px; text-decoration: none; font-weight: 600; font-size: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: none; cursor: pointer;
        }
        
        /* Кнопка Поделиться - выделяем цветом */
        .share-btn { background: #e0f2f1; color: #00796b; border: 1px solid #b2dfdb; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"></audio>

    <div class="main-screen" id="bg">
        <div class="content show" id="contentBlock">
            <div id="icon">🌿</div>
            <img src="" id="magicImg" class="magic-photo" style="display:none;">
            <h1 id="text">Приглашаю вас окунуться в мир плетения... <br>из бумажной лозы</h1>
            
            <div class="final-buttons" id="finalBtns">
                <a href="https://t.me/galina_i_loza" target="_blank" class="contact-btn">📢 Перейти в канал</a>
                <a href="https://t.me/galina_i_loza" target="_blank" class="contact-btn">💬 Написать мастеру</a>
                <button onclick="shareMagic()" class="contact-btn share-btn">✨ Отправить друзьям</button>
            </div>
        </div>

        <button id="nextBtn" onclick="nextSlide()">Начать путешествие ✨</button>
    </div>

    <script>
        let step = 0;
        const data = [
            { text: "Я покажу вам удивительный мир... Вы готовы?", icon: "🪄", img: "img/1.png", color: "linear-gradient(-45deg, #5d4037, #8d6e63)" },
            { text: "Ловкость рук — и обычная бумага превращается в кашпо 🧺", icon: "👐", img: "img/2.png", color: "linear-gradient(-45deg, #3e2723, #5d4037)" },
            { text: "Каждый прутик хранит тепло рук и тишину уютных вечеров...", icon: "☕", img: "img/3.png", color: "linear-gradient(-45deg, #4e342e, #795548)" },
            { text: "Красота в деталях, надежность в каждом витке 🌿", icon: "✨", img: "img/4.png", color: "linear-gradient(-45deg, #2c1e12, #3e2723)" },
            { text: "Создадим уют в вашем доме вместе?", icon: "🎁", img: "img/5.png", color: "linear-gradient(-45deg, #1a1c2c, #4a59a4)", isFinal: true }
        ];

        function nextSlide() {
            if (step === 0) {
                const music = document.getElementById('bgMusic');
                music.volume = 0.2;
                music.play().catch(() => console.log("Ждем клика для музыки"));
            }

            if (step < data.length) {
                const current = data[step];
                const block = document.getElementById('contentBlock');
                const btn = document.getElementById('nextBtn');
                
                block.classList.remove('show');

                setTimeout(() => {
                    document.getElementById('text').innerHTML = current.text;
                    document.getElementById('icon').innerText = current.icon;
                    const img = document.getElementById('magicImg');
                    img.src = current.img + "?v=" + new Date().getTime(); // Анти-кэш для картинок
                    img.style.display = 'block';
                    document.getElementById('bg').style.background = current.color;

                    if (current.isFinal) {
                        btn.style.display = 'none';
                        document.getElementById('finalBtns').style.display = 'flex';
                    } else {
                        btn.innerText = "Далее ➔";
                    }
                    block.classList.add('show');
                    step++;
                }, 400);
            }
        }

        function shareMagic() {
            if (navigator.share) {
                navigator.share({
                    title: 'Мир Бумажной Лозы',
                    text: 'Посмотри, какая красота! ✨',
                    url: window.location.href
                }).catch(console.error);
            } else {
                alert("Скопируйте ссылку и отправьте её друзьям!");
            }
        }
    </script>
</body>
</html>
