<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мир Бумажной Лозы</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; }

        .main-screen {
            background: linear-gradient(-45deg, #2c1e12, #5d4037, #8d6e63, #2c1e12);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; color: white;
            transition: background 1.5s ease;
        }

        @keyframes gradientMove { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }

        /* Красивая кнопка "Далее" */
        #nextBtn {
            z-index: 100; background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            color: white; border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 18px 45px; border-radius: 50px; font-size: 18px;
            cursor: pointer; transition: 0.4s; margin-top: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }
        #nextBtn:hover { background: rgba(255, 255, 255, 0.4); transform: translateY(-3px); }

        .content { opacity: 0; transform: translateY(20px); transition: 0.8s all; display: flex; flex-direction: column; align-items: center; }
        .content.show { opacity: 1; transform: translateY(0); }

        .magic-photo {
            width: 85vw; max-width: 320px; height: 400px; object-fit: cover;
            border-radius: 30px; border: 6px solid rgba(255,255,255,0.3);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); margin-bottom: 20px;
        }

        h1 { font-size: 22px; max-width: 85%; font-weight: 300; line-height: 1.4; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }

        /* Блок финальных кнопок */
        .final-buttons { display: none; flex-direction: column; gap: 12px; margin-top: 15px; width: 80%; max-width: 300px; }
        
        .contact-btn {
            background: white; color: #5d4037; padding: 15px 20px;
            border-radius: 20px; text-decoration: none; font-weight: 600; font-size: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.3s;
            border: none; cursor: pointer; display: block;
        }
        .contact-btn:hover { transform: scale(1.03); background: #fdf5f0; }
        
        /* Кнопка Поделиться - особенный стиль */
        .share-btn { background: #e0f2f1; color: #00796b; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"></audio>

    <div class="main-screen" id="bg">
        <div class="content show" id="contentBlock">
            <div id="icon" style="font-size: 60px; margin-bottom: 10px;">🌿</div>
            <img src="" id="magicImg" class="magic-photo" style="display:none;">
            <h1 id="text">Приглашаю вас окунуться в мир плетения... <br>из бумажной лозы</h1>
            
            <div class="final-buttons" id="finalBtns">
                <a href="https://t.me/ВАШ_КАНАЛ" target="_blank" class="contact-btn">Перейти в канал 📢</a>
                <a href="https://t.me/ВАШ_НИК" target="_blank" class="contact-btn">Написать мастеру 💬</a>
                <button onclick="shareMagic()" class="contact-btn share-btn">Отправить подруге ✨</button>
            </div>
        </div>

        <button id="nextBtn" onclick="nextSlide()">Начать путешествие ✨</button>
    </div>

    <script>
        let step = 0;
        const data = [
            { text: "Я покажу вам удивительный мир... Вы готовы?", icon: "🪄", img: "img/1.png", color: "linear-gradient(-45deg, #5d4037, #8d6e63)" },
            { text: "Ловкость рук — и обычная бумага превращается в кашпо 🧺", icon: "👐", img: "img/2.png", color: "linear-gradient(-45deg, #3e2723, #5d4037)" },
            { text: "Каждый прутик хранит тепло рук и тишину уютных вечеров...", icon: "☕", img: "img/3.png", color: "linear-gradient(-45deg, #4e342e, #795548)" },
            { text: "Красота в деталях, надежность в каждом витке 🌿", icon: "✨", img: "img/4.png", color: "linear-gradient(-45deg, #2c1e12, #3e2723)" },
            { text: "Создадим уют в вашем доме вместе?", icon: "🎁", img: "img/5.png", color: "linear-gradient(-45deg, #1a1c2c, #4a59a4)", isFinal: true }
        ];

        function nextSlide() {
            if (step === 0) {
                const music = document.getElementById('bgMusic');
                music.volume = 0.2;
                music.play();
            }

            if (step < data.length) {
                const current = data[step];
                const block = document.getElementById('contentBlock');
                const btn = document.getElementById('nextBtn');
                
                block.classList.remove('show');
                btn.innerText = "Далее ➔";

                setTimeout(() => {
                    document.getElementById('text').innerHTML = current.text;
                    document.getElementById('icon').innerText = current.icon;
                    const img = document.getElementById('magicImg');
                    img.src = current.img;
                    img.style.display = 'block';
                    document.getElementById('bg').style.background = current.color;

                    if (current.isFinal) {
                        btn.style.display = 'none';
                        document.getElementById('finalBtns').style.display = 'flex';
                    }
                    block.classList.add('show');
                    step++;
                }, 600);
            }
        }

        function shareMagic() {
            if (navigator.share) {
                navigator.share({
                    title: 'Мир Бумажной Лозы',
                    text: 'Посмотри, какую красоту делает моя сестра! ✨',
                    url: window.location.href
                }).catch(console.error);
            } else {
                alert("Скопируйте ссылку в браузере и отправьте её подруге!");
            }
        }
    </script>
</body>
</html>
